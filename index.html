<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이재우 포트폴리오 버블 맵</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
    
    body { margin: 0; padding: 20px; background: #0d1117; color: #e2e8f0; }
    
    .pw { background:#0d1117; border-radius:12px; padding:1.5rem 1rem 1rem; font-family:'JetBrains Mono',monospace; position:relative; overflow:hidden; border: 1px solid #30363d; }
    .pw::before { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(56,189,248,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.03) 1px,transparent 1px); background-size:32px 32px; pointer-events:none; }
    
    .ph { text-align:center; margin-bottom:0.5rem; position:relative; z-index:1; }
    .ph-cmd { font-size:10px; color:#484f58; letter-spacing:0.1em; }
    .ph-name { font-size:17px; color:#e2e8f0; font-weight:500; margin-top:3px; }
    .ph-sub { font-size:11px; color:#38bdf8; margin-top:2px; }
    
    .psvg { display:block; margin:0 auto; position:relative; z-index:1; max-width: 800px; }
    .node { cursor:pointer; }
    .node circle { transition:opacity 0.18s; }
    .node:hover circle { opacity:0.7; }
    
    .tooltip { 
      position:absolute; 
      z-index:10; 
      background:#161b22; 
      border:1px solid #38bdf8; 
      border-radius:8px; 
      padding:12px 16px; 
      color:#e2e8f0; 
      pointer-events:none; 
      display:none; 
      white-space: normal;      
      word-break: keep-all;     
      max-width: 220px;         
      line-height: 1.6;         
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .tt-name { font-weight:600; color:#38bdf8; margin-bottom:6px; font-size:14px; border-bottom: 1px solid #30363d; padding-bottom: 4px; }
    .tt-level { color:#7dd3fc; font-size:12px; }
    
    .pf { text-align:center; font-size:10px; color:#30363d; margin-top:0.5rem; position:relative; z-index:1; }

    .bubble { opacity:0; }
    @keyframes popIn {
      0%   { opacity:0; transform:scale(0.15); }
      65%  { opacity:1; transform:scale(1.06); }
      100% { opacity:1; transform:scale(1); }
    }
    @keyframes fadeInLine { from { opacity:0; } to { opacity:1; } }

    .center-bubble { opacity:0; transform-origin:335px 330px; animation:popIn 0.8s cubic-bezier(.22,.68,0,1.15) 0.2s forwards; }
    .b1  { transform-origin:155px 148px; animation:popIn 0.75s cubic-bezier(.22,.68,0,1.15) 1.0s  forwards; }
    .b2  { transform-origin:385px 118px; animation:popIn 0.65s cubic-bezier(.22,.68,0,1.15) 0.75s forwards; }
    .b3  { transform-origin:520px 165px; animation:popIn 0.80s cubic-bezier(.22,.68,0,1.15) 1.15s forwards; }
    .b4  { transform-origin:548px 278px; animation:popIn 0.70s cubic-bezier(.22,.68,0,1.15) 0.85s forwards; }
    .b5  { transform-origin:118px 305px; animation:popIn 0.78s cubic-bezier(.22,.68,0,1.15) 1.20s forwards; }
    .b6  { transform-origin:565px 415px; animation:popIn 0.62s cubic-bezier(.22,.68,0,1.15) 0.90s forwards; }
    .b7  { transform-origin:110px 468px; animation:popIn 0.68s cubic-bezier(.22,.68,0,1.15) 0.70s forwards; }
    .b8  { transform-origin:190px 500px; animation:popIn 0.80s cubic-bezier(.22,.68,0,1.15) 1.10s forwards; }
    .b9  { transform-origin:468px 488px; animation:popIn 0.66s cubic-bezier(.22,.68,0,1.15) 0.80s forwards; }
    .b10 { transform-origin:262px 560px; animation:popIn 0.60s cubic-bezier(.22,.68,0,1.15) 0.95s forwards; }
    .b11 { transform-origin:415px 578px; animation:popIn 0.74s cubic-bezier(.22,.68,0,1.15) 0.65s forwards; }
    .b12 { transform-origin:535px 548px; animation:popIn 0.62s cubic-bezier(.22,.68,0,1.15) 0.88s forwards; }
	.b13 { transform-origin:295px 200px; animation:popIn 0.72s cubic-bezier(.22,.68,0,1.15) 0.82s forwards; }

    .lines-group { animation:fadeInLine 0.7s ease 1.6s forwards; opacity:0; }
  </style>
</head>
<body>

<div class="pw" id="pw">
  <div class="ph">
    <div class="ph-cmd">~ $ portfolio --map</div>
    <div class="ph-name">이재우</div>
    <div class="ph-sub">LEE JAEWOO · PORTFOLIO</div>
  </div>

  <svg class="psvg" width="100%" viewBox="0 0 680 660" role="img">
    <desc>항목별 비중을 원의 크기로 표현한 포트폴리오 맵</desc>

    <g class="lines-group" stroke="#1a2a38" stroke-width="0.5" fill="none">
      <line x1="335" y1="330" x2="155" y2="148"/>
      <line x1="335" y1="330" x2="385" y2="118"/>
      <line x1="335" y1="330" x2="520" y2="165"/>
      <line x1="335" y1="330" x2="118" y2="305"/>
      <line x1="335" y1="330" x2="548" y2="278"/>
      <line x1="335" y1="330" x2="190" y2="500"/>
      <line x1="335" y1="330" x2="468" y2="488"/>
      <line x1="335" y1="330" x2="110" y2="468"/>
      <line x1="335" y1="330" x2="565" y2="415"/>
      <line x1="335" y1="330" x2="262" y2="560"/>
      <line x1="335" y1="330" x2="415" y2="578"/>
      <line x1="335" y1="330" x2="535" y2="548"/>
      <line x1="335" y1="330" x2="295" y2="200"/>
    </g>

    <g class="center-bubble">
      <circle cx="335" cy="330" r="50" fill="#0d1117" stroke="#38bdf8" stroke-width="1.4"/>
      <text x="335" y="326" text-anchor="middle" font-size="13" font-weight="500" fill="#38bdf8">이재우</text>
      <text x="335" y="341" text-anchor="middle" font-size="9" fill="#7dd3fc">LEE JAEWOO</text>
    </g>

    <g class="node bubble b1" data-name="Project Management" data-level="자동차 도메인 비즈니스<br>핵심 시스템 설계 및 운영 총괄" onclick="showTip(event,this)">
      <circle cx="155" cy="148" r="74" fill="#0b1c2c" stroke="#38bdf8" stroke-width="1"/>
      <text x="155" y="142" text-anchor="middle" font-size="11" fill="#e2e8f0">Project</text>
      <text x="155" y="157" text-anchor="middle" font-size="11" fill="#e2e8f0">Management</text>
    </g>

    <g class="node bubble b2" data-name="Linux" data-level="크로스 플랫폼 인프라 구축<br>엔터프라이즈 환경 통합 운영" onclick="showTip(event,this)">
      <circle cx="385" cy="118" r="26" fill="#0b1c2c" stroke="#1d3550" stroke-width="0.5"/>
      <text x="385" y="122" text-anchor="middle" font-size="10" fill="#7a9eb5">Linux</text>
    </g>

    <g class="node bubble b3" data-name="Development" data-level="15년 차 엔터프라이즈 IT 아키텍트" onclick="showTip(event,this)">
      <circle cx="520" cy="165" r="78" fill="#0b1c2c" stroke="#38bdf8" stroke-width="1"/>
      <text x="520" y="169" text-anchor="middle" font-size="12" fill="#e2e8f0">Development</text>
    </g>

    <g class="node bubble b4" data-name="Standardization" data-level="인터페이스 표준화 구축<br>데이터 표준화 구축" onclick="showTip(event,this)">
      <circle cx="548" cy="278" r="52" fill="#0b1c2c" stroke="#2176ae" stroke-width="0.7"/>
      <text x="548" y="273" text-anchor="middle" font-size="10" fill="#d0e4f0">Standard-</text>
      <text x="548" y="287" text-anchor="middle" font-size="10" fill="#d0e4f0">ization</text>
    </g>

    <g class="node bubble b5" data-name="Interface" data-level="시스템 데이터 연동(ERP,EAI..)<br>설비데이터 연동(RS232,TCP/IP..)" onclick="showTip(event,this)">
      <circle cx="118" cy="305" r="70" fill="#0b1c2c" stroke="#38bdf8" stroke-width="1"/>
      <text x="118" y="309" text-anchor="middle" font-size="13" fill="#e2e8f0">Interface</text>
    </g>

    <g class="node bubble b6" data-name="WBS" data-level="효율적인 업무 분할<br>진척도 분석 관리" onclick="showTip(event,this)">
      <circle cx="565" cy="415" r="40" fill="#0b1c2c" stroke="#1d4a6e" stroke-width="0.5"/>
      <text x="565" y="419" text-anchor="middle" font-size="13" fill="#b0cce0">WBS</text>
    </g>

    <g class="node bubble b7" data-name="Java" data-level="Spring Framework 기반의<br>안정적인 백엔드 서비스 개발" onclick="showTip(event,this)">
      <circle cx="110" cy="468" r="36" fill="#0b1c2c" stroke="#1d4a6e" stroke-width="0.5"/>
      <text x="110" y="472" text-anchor="middle" font-size="12" fill="#b0cce0">Java</text>
    </g>

    <g class="node bubble b8" data-name="PL-SQL" data-level="대규모 트랜잭션 처리 및<br>데이터베이스 쿼리 최적화 전문가" onclick="showTip(event,this)">
      <circle cx="190" cy="500" r="56" fill="#0b1c2c" stroke="#2176ae" stroke-width="0.7"/>
      <text x="190" y="504" text-anchor="middle" font-size="13" fill="#d0e4f0">PL-SQL</text>
    </g>

    <g class="node bubble b9" data-name="AI" data-level="취약점 분석 체계 도입<br>다중 에이전트 교차검증" onclick="showTip(event,this)">
      <circle cx="468" cy="488" r="44" fill="#0b1c2c" stroke="#1d4a6e" stroke-width="0.5"/>
      <text x="468" y="492" text-anchor="middle" font-size="14" fill="#b0cce0">AI</text>
    </g>

    <g class="node bubble b10" data-name="Python" data-level="데이터 수집 자동화" onclick="showTip(event,this)">
      <circle cx="262" cy="560" r="26" fill="#0b1c2c" stroke="#1d3550" stroke-width="0.5"/>
      <text x="262" y="564" text-anchor="middle" font-size="9.5" fill="#7a9eb5">Python</text>
    </g>

    <g class="node bubble b11" data-name="C#" data-level="Windows Application Developer<br>제조 실행 시스템(MES) 개발" onclick="showTip(event,this)">
      <circle cx="415" cy="578" r="52" fill="#0b1c2c" stroke="#2176ae" stroke-width="0.7"/>
      <text x="415" y="582" text-anchor="middle" font-size="16" fill="#d0e4f0">C#</text>
    </g>

    <g class="node bubble b12" data-name="Web" data-level="사용자 친화적 UI/UX<br>인터페이스 구현" onclick="showTip(event,this)">
      <circle cx="535" cy="548" r="36" fill="#0b1c2c" stroke="#1d4a6e" stroke-width="0.5"/>
      <text x="535" y="552" text-anchor="middle" font-size="12" fill="#b0cce0">Web</text>
    </g>
	
	<g class="node bubble b13" data-name="Infrastructure" data-level="IT 인프라 및 전산 공사 총괄<br>네트워크/하드웨어 구축 감독" onclick="showTip(event,this)">
      <circle cx="295" cy="200" r="48" fill="#0b1c2c" stroke="#2176ae" stroke-width="0.7"/>
      <text x="295" y="196" text-anchor="middle" font-size="11" fill="#d0e4f0">Infra-</text>
      <text x="295" y="210" text-anchor="middle" font-size="11" fill="#d0e4f0">structure</text>
    </g>

    <circle cx="46" cy="28" r="11" fill="#0b1c2c" stroke="#38bdf8" stroke-width="0.8"/>
    <text x="110" y="32" font-size="9" fill="#484f58">원 클릭 = 상세정보</text>
  </svg>

  <div class="pf">원을 클릭하면 상세 정보 표시 · © LEE JAEWOO</div>
  
  <div class="tooltip" id="tt">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-level" id="tt-level"></div>
  </div>
</div>

<script>
var tipTimer = null;

function showTip(e, el) {
  var tt = document.getElementById('tt');
  var pw = document.getElementById('pw');
  
  if (tipTimer) clearTimeout(tipTimer);

  document.getElementById('tt-name').innerHTML = el.getAttribute('data-name');
  document.getElementById('tt-level').innerHTML = el.getAttribute('data-level');
  
  var rect = pw.getBoundingClientRect();
  tt.style.left = (e.clientX - rect.left + 15) + 'px';
  tt.style.top  = (e.clientY - rect.top  + 15) + 'px';
  tt.style.display = 'block';

  tipTimer = setTimeout(function(){ 
    tt.style.display = 'none';
    tipTimer = null;
  }, 5000); 
}

document.addEventListener('click', function(e){
  if(!e.target.closest('.node')) {
    document.getElementById('tt').style.display = 'none';
    if (tipTimer) clearTimeout(tipTimer);
  }
});
</script>

</body>
</html>
