<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
  .pw { background:#0d1117; border-radius:12px; padding:1.5rem 1rem 1rem; font-family:'JetBrains Mono',monospace; position:relative; overflow:hidden; }
  .pw::before { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(56,189,248,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.03) 1px,transparent 1px); background-size:32px 32px; pointer-events:none; }
  .ph { text-align:center; margin-bottom:0.5rem; position:relative; z-index:1; }
  .ph-cmd { font-size:10px; color:#484f58; letter-spacing:0.1em; }
  .ph-name { font-size:17px; color:#e2e8f0; font-weight:500; margin-top:3px; }
  .ph-sub { font-size:11px; color:#38bdf8; margin-top:2px; }
  .psvg { display:block; margin:0 auto; position:relative; z-index:1; }
  .node { cursor:pointer; }
  .node circle { transition:opacity 0.18s; }
  .node:hover circle { opacity:0.7; }
  .tooltip { position:absolute; z-index:10; background:#161b22; border:0.5px solid #38bdf8; border-radius:8px; padding:8px 13px; font-size:11px; color:#e2e8f0; pointer-events:none; display:none; white-space:nowrap; }
  .tt-name { font-weight:500; color:#38bdf8; margin-bottom:3px; }
  .tt-level { color:#7dd3fc; font-size:10px; }
  .pf { text-align:center; font-size:10px; color:#30363d; margin-top:0.5rem; position:relative; z-index:1; }

  .bubble { opacity:0; }
  @keyframes popIn {
    0%   { opacity:0; transform:scale(0.15); }
    65%  { opacity:1; transform:scale(1.06); }
    100% { opacity:1; transform:scale(1); }
  }
  @keyframes fadeInLine {
    from { opacity:0; }
    to   { opacity:1; }

  .b7  { transform-origin:110px 468px; animation:popIn 0.68s cubic-bezier(.22,.68,0,1.15) 0.70s forwards; }
  .b8  { transform-origin:190px 500px; animation:popIn 0.80s cubic-bezier(.22,.68,0,1.15) 1.10s forwards; }

<script>
// 타이머 ID를 저장할 변수를 함수 바깥(상위 스코프)에 선언합니다.
var tipTimer = null;

function showTip(e, el) {
  var tt = document.getElementById('tt');
  var pw = document.getElementById('pw');
  
  // 1. 기존에 실행 중인 타이머가 있다면 취소합니다. (초기화)
  if (tipTimer) {
    clearTimeout(tipTimer);
  }

  document.getElementById('tt-name').textContent = el.getAttribute('data-name');
  document.getElementById('tt-level').textContent = '비중: ' + el.getAttribute('data-level');
  
  var rect = pw.getBoundingClientRect();
  tt.style.left = (e.clientX - rect.left + 12) + 'px';
  tt.style.top  = (e.clientY - rect.top  + 12) + 'px';
  tt.style.display = 'block';

  // 2. 시간을 5000ms(5초) 등으로 늘려 더 오래 표시되게 합니다.
  tipTimer = setTimeout(function(){ 
    tt.style.display = 'none';
    tipTimer = null; // 타이머 종료 후 변수 비우기
  }, 5000); 
}

document.addEventListener('click', function(e){
  if(!e.target.closest('.node')) {
    document.getElementById('tt').style.display = 'none';
    if (tipTimer) clearTimeout(tipTimer); // 바깥 클릭 시에도 타이머 취소
  }
});
</script>
